server:
  port: ${PORT:8080}


spring:
  application:
    name: person
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/renderpractice}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-change-me-please-32bytes}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}
